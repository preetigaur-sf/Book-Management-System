<div class="flex justify-center mt-10">

  <form (ngSubmit)="addBook()"
        class="w-full max-w-lg bg-white p-6 rounded-lg shadow-md space-y-4">

    <h2 class="text-2xl font-bold text-center text-gray-700">
      Add Book
    </h2>

    <input [(ngModel)]="book.title" name="title"
      placeholder="Title"
      class="w-full border p-2 rounded" required>

    <input [(ngModel)]="book.author" name="author"
      placeholder="Author"
      class="w-full border p-2 rounded" required>

    <input [(ngModel)]="book.isbn" name="isbn"
      placeholder="ISBN"
      class="w-full border p-2 rounded"
      pattern="^\d{10}$|^\d{13}$"
      required>

    <input type="date" [(ngModel)]="book.publication_date"
      name="publication_date"
      class="w-full border p-2 rounded" required>

    <select [(ngModel)]="book.genre" name="genre"
      class="w-full border p-2 rounded" required>
      <option value="">Select Genre</option>
      <option>Technology</option>
      <option>History</option>
      <option>Science</option>
      <option>Fiction</option>
      <option>Non-Fiction</option>
    </select>

    <input type="number" [(ngModel)]="book.price"
      name="price"
      placeholder="Price"
      class="w-full border p-2 rounded" required>

    <button type="submit"
      class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
      Add Book
    </button>

  </form>

</div>
