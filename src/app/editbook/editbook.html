<form
  [formGroup]="bookForm"
  (ngSubmit)="updatebook()"
  class="max-w-xl mx-auto mt-8 bg-white/80 backdrop-blur-lg shadow-2xl p-8 rounded-2xl border border-gray-200"
>
  <h2 class="text-3xl font-bold mb-6 text-center text-green-600 tracking-wide">Edit Book</h2>

  <div class="space-y-4">
    <input
      formControlName="title"
      placeholder="Title"
      class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition-all"
    />

    <input
      formControlName="author"
      placeholder="Author"
      class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition-all"
    />

    <input
      formControlName="isbn"
      placeholder="ISBN"
      class="w-full border border-gray-300 p-3 rounded-lg bg-gray-100 cursor-not-allowed"
      readonly
    />

    <input
      type="date"
      formControlName="publication_date"
      class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition-all"
    />

    <select
      formControlName="genre"
      class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition-all"
    >
      <option value="">Select Genre</option>
      <option>Technology</option>
      <option>History</option>
      <option>Science</option>
      <option>Non-Fiction</option>
      <option>Fiction</option>
    </select>

    <input
      type="number"
      formControlName="price"
      placeholder="Price"
      class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none transition-all"
    />
  </div>

  <button
    type="submit"
    class="w-full mt-6 bg-gradient-to-r from-green-500 to-emerald-500 text-white py-3 rounded-lg font-semibold shadow-md hover:scale-[1.02] hover:shadow-lg transition-all duration-200"
  >
    Update Book
  </button>
</form>
