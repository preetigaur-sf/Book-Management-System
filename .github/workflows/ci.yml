name: Added GitHub Actions CI pipeline

on:
  push:
    branches:
      - Added_Microservice_Architecture_and_loopback4_exercise

jobs:
  build-book-service:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_HOST: ${{ secrets.DB_HOST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: book-service

      - run: npm run build
        working-directory: book-service

      - run: echo "Secrets loaded successfully"