name: Solid Principle BMS CI

on:
  push:
    branches: [solid-principle-bms]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Solid-Principle-bms

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build